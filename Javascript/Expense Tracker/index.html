<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Expense Tracker</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- ✅ Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="container" id="con">
        <nav class="nav-bar">
            <h1>EXPENSE TRACKER</h1>
            <h5>KABILAN</h5>
        </nav>
    </div>
</div>

<!-- SUMMARY -->
<div class="expense">
  <div class="container">
    <div class="row">
      <div class="col-lg-3">
        <h5>Total Spend Amount:</h5>
        <p id="totalamt"></p>
      </div>

      <div class="col-lg-3">
        <h5 id="periods"></h5>
        <p id="periodamt"></p>
      </div>

      <div class="col-lg-3">
        <h5 id="category-type"></h5>
        <p id="category-type-amt"></p>
      </div>

      <div class="col-lg-3">
        <button class="btn btn-light btn-sm mt-2" onclick="showChart()" id="chartBtn">
            Show Chart
        </button>
      </div>
    </div>
  </div>
</div>

<!-- TABLE + FILTER -->
<div class="display-events">
<div class="container">

<nav class="navbar navbar-expand-lg bg-body-tertiary mt-4">
<div class="container-fluid">

<ul class="navbar-nav me-auto">

<!-- TIME FILTER -->
<li class="nav-item dropdown">
<a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Select Time Period</a>
<ul class="dropdown-menu">
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); dayfilter('Last Year')">Last Year</a></li>
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); dayfilter('Last six Months')">Last six Months</a></li>
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); dayfilter('Last One Month')">Last One Month</a></li>
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); dayfilter('Last Week')">Last Week</a></li>
</ul>
</li>

<!-- CATEGORY FILTER -->
<li class="nav-item dropdown">
<a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">Select Type</a>
<ul class="dropdown-menu">
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); filterCategory('All')">All</a></li>
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); filterCategory('Salary')">Salary</a></li>
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); filterCategory('Travel')">Travel</a></li>
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); filterCategory('Food')">Food</a></li>
<li><a class="dropdown-item" href="#" onclick="event.preventDefault(); filterCategory('Medicine')">Medicine</a></li>
</ul>
</li>

</ul>

<input type="text" id="sch" class="form-control me-2 w-25" placeholder="Search" onkeyup="search()">
<button class="btn btn-success me-2" onclick="search()">Search</button>

<button class="btn btn-success" id="addnew">Add New</button>

</div>
</nav>

<table class="table mt-3">
<thead>
<tr>
<th>S.no</th>
<th>Date</th>
<th>Amount</th>
<th>Category</th>
<th>Type</th>
<th>Reference</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="t-body"></tbody>
</table>

</div>
</div>

<!-- YOUR FORM (UNCHANGED ✅) -->
<div class="add-expense">
    <div class="container">
        <div class="row" id="row">
            <form class="form">
                <div class="mb-3">
                  <label for="date" class="form-label">Date</label>
                  <input type="date" class="form-control" id="date">
                </div>
                <div class="mb-3">
                  <label for="amount" class="form-label">Amount</label>
                  <input type="number" class="form-control" id="amount">
                </div>
                <div class="mb-3">
                    <label for="category" class="form-label">Category</label>
                    <input type="text" class="form-control" id="category">
                  </div>
                <div class="mb-3">
                    <label for="type" class="form-label">Type</label>
                    <input type="text" class="form-control" id="type">
                </div>
                <div class="mb-3">
                    <label for="reference" class="form-label">Reference</label>
                    <input type="text" class="form-control" id="reference">
                </div>
                <button type="submit" class="btn btn-primary" id="submit-btn">Submit</button>
              </form>
        </div>
    </div>
</div>

<!-- CHART -->
<div class="container mt-4" id="chartSection">
    <canvas id="expenseChart"></canvas>
</div>

<!-- ✅ IMPORTANT ORDER -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
</html>
